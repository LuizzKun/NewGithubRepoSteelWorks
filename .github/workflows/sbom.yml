name: Generate SBOM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy pytest pytest-cov ruff mypy pre-commit
      
      - name: Generate SBOM with pip-licenses
        run: |
          pip install pip-licenses
          pip-licenses --format=json --output-file=sbom-pip-licenses.json
          pip-licenses --format=markdown --output-file=sbom-pip-licenses.md
      
      - name: Generate SBOM with CycloneDX
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom-cyclonedx.json
      
      - name: Generate requirements.txt
        run: |
          pip freeze > requirements-frozen.txt
      
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            sbom-*.json
            sbom-*.md
            requirements-frozen.txt
      
      - name: Display SBOM summary
        run: |
          echo "### SBOM Generated Successfully ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following SBOM files have been generated:" >> $GITHUB_STEP_SUMMARY
          echo "- sbom-pip-licenses.json (JSON format)" >> $GITHUB_STEP_SUMMARY
          echo "- sbom-pip-licenses.md (Markdown format)" >> $GITHUB_STEP_SUMMARY
          echo "- sbom-cyclonedx.json (CycloneDX format)" >> $GITHUB_STEP_SUMMARY
          echo "- requirements-frozen.txt (Pip freeze)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
