name: Code Quality & Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov sqlalchemy
      
      - name: Run ruff formatter check
        run: python -m ruff format src tests --check
      
      - name: Run ruff linter
        run: python -m ruff check src tests
      
      - name: Run mypy type checker
        run: python -m mypy src tests --ignore-missing-imports
      
      - name: Run pytest with coverage
        run: python -m pytest tests/ -v --cov=src/steelworks --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
